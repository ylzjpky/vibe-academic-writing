name: Feature request
description: Propose a safe, generalizable improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: What workflow limitation should be addressed?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and privacy impact
      description: Describe authentication, data retention, institutional-policy, and academic-integrity implications.
    validations:
      required: true
