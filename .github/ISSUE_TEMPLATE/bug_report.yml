name: Bug report
description: Report a reproducible problem using synthetic or redacted data.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Do not include credentials, private course content, student information, session data, or signed URLs. Use private vulnerability reporting for security issues."
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "1.2.0"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Codex
        - Other Agent Skills client
        - Unknown
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: Describe expected and actual behavior with synthetic or redacted data.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide minimal safe steps and non-sensitive diagnostics.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed credentials, session data, personal information, signed URLs, and private course material.
          required: true
